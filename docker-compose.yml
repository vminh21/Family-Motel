version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: motel_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2024
      MYSQL_DATABASE: family_motel_db
      MYSQL_USER: motel_user
      MYSQL_PASSWORD: motel_pass_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - motel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: motel_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "5001:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - motel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: motel_frontend
    restart: always
    environment:
      - INTERNAL_API_URL=http://backend:5000/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - motel_network

volumes:
  mysql_data:
    driver: local

networks:
  motel_network:
    driver: bridge
